<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Site de Teologia - Em Construção</title>
    <style>
        body {
            font-family: 'Georgia', serif;
            background: linear-gradient(to bottom, #f0f4f8, #e6edf2);
            color: #333;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            padding: 50px 20px;
        }

        h1 {
            margin-bottom: 30px;
            color: #2c3e50;
            text-align: center;
        }

        .links {
            display: flex;
            flex-direction: column;
            gap: 15px;
            margin-bottom: 20px;
            text-align: center;
        }

        .links a {
            text-decoration: none;
        }

        .links button {
            background-color: #2980b9;
            color: #fff;
            border: none;
            padding: 12px 25px;
            border-radius: 8px;
            font-size: 1em;
            font-weight: bold;
            cursor: pointer;
            transition: background-color 0.3s;
        }

        .links button:hover {
            background-color: #1c5980;
        }

        .coming-soon {
            font-style: italic;
            margin-bottom: 50px;
            color: #555;
        }

        footer {
            font-size: 0.9em;
            color: #777;
            text-align: center;
            margin-top: 50px;
        }
    </style>
</head>
